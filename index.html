  <title>OK국카페 주문서</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, "Malgun Gothic", sans-serif;
      background: #f4f4f4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .wrap {
      background: #fff;
      border: 1px solid #ddd;
      padding: 40px 30px;
      text-align: center;
      width: 90%;
      max-width: 400px;
    }
    .title {
      font-size: 24px;
      font-weight: 700;
      color: #111;
      margin-bottom: 10px;
    }
    .desc {
      font-size: 15px;
      color: #666;
      margin-bottom: 30px;
    }
    .order-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: #2d6cdf;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      border: 0;
      cursor: pointer;
      text-decoration: none;
    }
    .order-btn:active {
      background: #1a3a5c;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">OK국카페 주문서</div>
